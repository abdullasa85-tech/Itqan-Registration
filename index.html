<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مركز إتقان العربية — نموذج التسجيل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800&family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* جميع الـ CSS السابقة (لم يتم تغييرها إلا القليل) */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C8A84B;--gold-l:#E2C97E;--gold-d:#8B6914;--gold-s:#F7E9B8;
  --ink:#0E0B04;--ink2:#1C1709;--ink3:#2A2310;
  --parch:#FAF6EC;--parch2:#F2ECD8;--parch3:#E8DFC4;
  --muted:#7A6B48;--muted2:#A89568;
  --border:rgba(200,168,75,.3);--border2:rgba(200,168,75,.15);
  --red:#C0392B;--green:#1E6B45;
  --r:10px;--r2:14px;--r3:20px;
  --shadow:0 4px 24px rgba(14,11,4,.12);
  --shadow2:0 8px 44px rgba(14,11,4,.18);
}
html{scroll-behavior:smooth}
body{font-family:'Tajawal',sans-serif;background:var(--parch);color:var(--ink);min-height:100vh;direction:rtl;overflow-x:hidden}
body.ltr{font-family:'Cormorant Garamond',serif;direction:ltr;text-align:left}
body.ru{font-family:'Cormorant Garamond',serif;direction:ltr;text-align:left}
body.fr{font-family:'Cormorant Garamond',serif;direction:ltr;text-align:left}

/* ... باقي الـ CSS كما هو (لم أكتبه كاملاً هنا للاختصار) ... */
.sig-container{
  width:100%;height:180px;position:relative;
  border:2px solid var(--parch3);border-radius:var(--r2);
  background:var(--parch);cursor:crosshair;
  transition:border-color .25s,box-shadow .25s;
  overflow:hidden;
}
.sig-container.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,168,75,.15)}
#sigCanvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;touch-action:none}
.sig-ph{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;transition:opacity .3s}
.sig-ph.gone{opacity:0}
</style>
</head>
<body data-lang="ar">

<!-- باقي HTML كما هو بدون تغيير (الـ header, location, type selector, form sections...) -->
<!-- (للاختصار لم أكرر كل الـ HTML هنا، لكن في الملف النهائي يكون كاملاً) -->

<div class="form-shell">
<form id="mainForm" novalidate>
  <!-- ... جميع الحقول السابقة ... -->

  <!-- قسم التوقيع -->
  <div class="sec-card form-section visible" data-sections="adult child staff">
    <div class="sec-header"><div class="sec-icon">✍️</div><div>
      <div class="sec-title-ar" data-t="ar">التوقيع الشخصي</div>
      <div class="sec-title-ar" data-t="en">Personal Signature</div>
      <div class="sec-title-en">Signature · التوقيع</div>
    </div></div>
    <div class="sec-body">
      <div class="sig-wrap">
        <div class="sig-container" id="sigContainer">
          <canvas id="sigCanvas"></canvas>
          <div class="sig-ph" id="sigPh">
            <span class="sig-ph-icon">✍️</span>
            <p class="sig-ph-text" data-t="ar">وقّع هنا بإصبعك أو بالماوس</p>
            <p class="sig-ph-text" data-t="en">Sign here with finger or mouse</p>
          </div>
        </div>
        <input type="hidden" name="signature" id="sigData">
        <div class="sig-btns">
          <button type="button" class="sig-btn clear" onclick="clearSig()">مسح التوقيع</button>
        </div>
      </div>
    </div>
  </div>

  <div class="submit-area">
    <button type="button" class="submit-btn" id="submitBtn" onclick="handleSubmit()">
      <span data-t="ar">إرسال الطلب ←</span>
      <span data-t="en">Submit Application →</span>
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</form>

<div class="success-panel" id="successPanel">
  <span class="success-icon">✅</span>
  <p class="success-title" data-t="ar">جزاك الله خيراً — تم إرسال طلبك بنجاح</p>
  <p class="success-text" data-t="ar">سيتواصل معك فريقنا قريباً</p>
</div>
</div>

<script>
// ====================== CONFIG ======================
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyyagJ5foOasjSCZeqIspuvtghHrF7ZEI68-dyjXRo1mJuOdCZ5nS3HejV_5m5_nsA4aw/exec';

// ====================== LANGUAGE ======================
var LANG = 'ar';
function setLang(l){ /* ... كما كان ... */ }

// ====================== SIGNATURE (محسن) ======================
let sigCanvas, sigCtx, isDrawing = false;

function initSignature() {
  sigCanvas = document.getElementById('sigCanvas');
  sigCtx = sigCanvas.getContext('2d');
  const container = document.getElementById('sigContainer');
  const rect = container.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  sigCanvas.width = rect.width * dpr;
  sigCanvas.height = rect.height * dpr;
  sigCanvas.style.width = rect.width + 'px';
  sigCanvas.style.height = rect.height + 'px';

  sigCtx.scale(dpr, dpr);
  sigCtx.strokeStyle = '#0E0B04';
  sigCtx.lineWidth = 3.5;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';
}

function getPos(e) {
  const rect = sigCanvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function startDrawing(e) {
  e.preventDefault();
  isDrawing = true;
  const pos = getPos(e);
  sigCtx.beginPath();
  sigCtx.moveTo(pos.x, pos.y);
}

function draw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPos(e);
  sigCtx.lineTo(pos.x, pos.y);
  sigCtx.stroke();
  document.getElementById('sigPh').classList.add('gone');
}

function stopDrawing() {
  isDrawing = false;
  document.getElementById('sigData').value = sigCanvas.toDataURL('image/png');
}

function clearSig() {
  sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
  document.getElementById('sigPh').classList.remove('gone');
  document.getElementById('sigData').value = '';
}

// ====================== SUBMIT (محسن) ======================
function handleSubmit() {
  if (!activeType) {
    alert(LANG === 'ar' ? 'يرجى اختيار نوع الطلب أولاً (الخطوة 1)' : 'Please select application type first');
    document.getElementById('typeCard').classList.add('pulse-needed');
    return;
  }

  const btn = document.getElementById('submitBtn');
  const errorEl = document.getElementById('errorMsg');

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>${LANG === 'ar' ? 'جاري الإرسال...' : 'Submitting...'}`;
  errorEl.classList.remove('show');

  const form = document.getElementById('mainForm');
  const fd = new FormData(form);
  const data = {};

  fd.forEach((v, k) => data[k] = v);

  data.app_type = activeType;
  data.language = LANG;
  data.application_date = document.getElementById('appDate').value;
  data.timestamp = new Date().toISOString();

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(text => {
    if (text.includes("OK")) {
      showSuccess();
    } else {
      throw new Error("Failed");
    }
  })
  .catch(err => {
    console.error(err);
    btn.disabled = false;
    btn.innerHTML = LANG === 'ar' ? 'إرسال الطلب ←' : 'Submit Application →';
    errorEl.classList.add('show');
  });
}

function showSuccess() {
  document.getElementById('mainForm').style.display = 'none';
  document.getElementById('successPanel').classList.add('show');
}

// ====================== INIT ======================
window.addEventListener('load', () => {
  initSignature();
  // باقي الدوال (setLang, selectType, updateDate...)
  updateDate();
});
</script>

</body>
</html>
